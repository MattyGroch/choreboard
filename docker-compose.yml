services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: choreboard
      POSTGRES_PASSWORD: choreboard
      POSTGRES_DB: choreboard
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U choreboard']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://choreboard:choreboard@db:5432/choreboard
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: ${PORT:-3001}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3001}
    ports:
      - '${PORT:-3001}:${PORT:-3001}'
    restart: unless-stopped
    # Traefik labels — uncomment and adjust for your setup:
    # labels:
    #   - 'traefik.enable=true'
    #   - 'traefik.http.routers.choreboard.rule=Host(`choreboard.example.com`)'
    #   - 'traefik.http.routers.choreboard.entrypoints=websecure'
    #   - 'traefik.http.routers.choreboard.tls.certresolver=letsencrypt'
    #   - 'traefik.http.services.choreboard.loadbalancer.server.port=3001'

volumes:
  db_data:
